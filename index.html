<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="light dark" />
  <title>صحوة</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>

  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">ص</div>
        <div>
          <div class="brand-title">صحوة</div>
          <div class="brand-subtitle">معاً لبناء جيل الصحوة</div>
        </div>
      </div>

      <div class="topbar-actions">
        <button id="themeToggle" class="icon-btn" type="button" aria-label="تبديل الوضع">
          <span class="icon-sun">☀</span>
          <span class="icon-moon">☾</span>
        </button>
        <button id="logoutBtn" class="ghost-btn hidden" type="button">خروج</button>
      </div>
    </header>

    <main>
      <section id="authView" class="panel auth-panel">
        <div class="panel-copy">
          <span class="pill">دخول سريع</span>
          <h1>سجّل دخولك وابدأ النشر</h1>
          <p></p>
        </div>

        <div class="auth-card glass">
          <div class="tabs" role="tablist" aria-label="تبديل نمط الدخول">
            <button id="loginTab" class="tab active" type="button">تسجيل الدخول</button>
            <button id="registerTab" class="tab" type="button">إنشاء حساب</button>
          </div>

          <form id="loginForm" class="form-grid">
            <label>
              <span>البريد الإلكتروني</span>
              <input id="loginEmail" type="email" placeholder="name@example.com" autocomplete="email" required />
            </label>
            <label>
              <span>كلمة المرور</span>
              <input id="loginPassword" type="password" placeholder="••••••••" autocomplete="current-password" required />
            </label>
            <button class="primary-btn" type="submit">دخول</button>
          </form>

          <form id="registerForm" class="form-grid hidden">
            <label>
              <span>الاسم المستعار</span>
              <input id="registerNickname" type="text" placeholder="اسم مستعار" minlength="2" maxlength="24" required />
            </label>
            <label>
              <span>البريد الإلكتروني</span>
              <input id="registerEmail" type="email" placeholder="name@example.com" autocomplete="email" required />
            </label>
            <label>
              <span>كلمة المرور</span>
              <input id="registerPassword" type="password" placeholder="لا تقل عن 6 أحرف" minlength="6" autocomplete="new-password" required />
            </label>
            <button class="primary-btn" type="submit">إنشاء الحساب</button>
          </form>
        </div>
      </section>

      <section id="appView" class="panel app-panel hidden">
        <div class="hero-card glass">
          <div>
            <span class="pill">الواجهة الرئيسية</span>
            <h2 id="welcomeTitle">أهلاً بك</h2>
            <p id="welcomeText">يمكنك الآن كتابة منشور جديد أو التفاعل مع منشورات الآخرين.</p>
          </div>
          <div class="stats">
            <div class="stat">
              <strong id="postsCount">0</strong>
              <span>منشور</span>
            </div>
            <div class="stat">
              <strong id="commentsCount">0</strong>
              <span>تعليق</span>
            </div>
          </div>
        </div>

        <section class="composer glass">
          <div class="section-head">
            <h3>إنشاء منشور</h3>
            <p>انشر رأيك أو أفكارك للمتابعين.</p>
          </div>

          <form id="postForm" class="post-form">
            <label>
              <span>العنوان</span>
              <input id="postTitle" type="text" placeholder="عنوان المنشور" maxlength="120" required />
            </label>
            <label>
              <span>المحتوى</span>
              <textarea id="postContent" rows="5" placeholder="اكتب المنشور هنا..." maxlength="4000" required></textarea>
            </label>
            <button class="primary-btn" type="submit">نشر</button>
          </form>
        </section>

        <section class="feed-head">
          <div>
            <h3>المنشورات الحديثة</h3>
            <p>الإعجابات والتعليقات تُحدّث مباشرة من Firestore.</p>
          </div>
          <div class="feed-actions">
            <button id="refreshBtn" class="ghost-btn" type="button">تحديث</button>
          </div>
        </section>

        <section id="feed" class="feed"></section>
      </section>
    </main>

    <div id="toast" class="toast" aria-live="polite" aria-atomic="true"></div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
